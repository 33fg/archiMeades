# WO-1: Local PostgreSQL for development and testing
# Use: docker compose up -d postgres redis
# DATABASE_URL=postgresql+asyncpg://gravitational:gravitational@localhost:5432/gravitational

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gravitational
      POSTGRES_PASSWORD: gravitational
      POSTGRES_DB: gravitational
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravitational -d gravitational"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    # WO-3: Neo4j for theory lineage and provenance
    # Uses 7475/7688 to avoid conflict with other Neo4j instances (researchplatform, carver)
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/gravitational
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  localstack:
    # WO-4: LocalStack for local S3 emulation
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: "0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  celery:
    # Celery worker for simulations, MCMC, etc.
    build: .
    command: celery -A app.celery_app worker -l info -Q gravitational,dgx -n gravitational_worker@%h
    environment:
      # host.docker.internal = host machine (Mac/Win); Redis exposed on host:6379
      REDIS_URL: redis://host.docker.internal:6379/0
      # Use SQLite (same as API default) - volume mount gives shared backend/gravitational.db
      DATABASE_URL: sqlite+aiosqlite:///./gravitational.db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: gravitational
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /app/backend

volumes:
  postgres_data: {}
  neo4j_data: {}
